[build]
  publish = "public"
  functions = "api"

[functions]
  # zisi copies node_modules wholesale; esbuild (the default) strips .node binaries.
  node_bundler = "zisi"
  # Tell zisi not to bundle sharp — copy the whole directory so the
  # platform-specific @img/sharp-linux-x64 native binding is preserved.
  external_node_modules = ["sharp"]

[[redirects]]
  from = "/manifest.webmanifest"
  to = "/.netlify/functions/pwaManifest"
  status = 200

[[redirects]]
  from = "/"
  to = "/player.html"
  status = 200

[[redirects]]
  from = "/catalogue"
  to = "/.netlify/functions/catalogue"
  status = 200

[[redirects]]
  from = "/album/:albumId"
  to = "/.netlify/functions/makeSharePage?album=:albumId"
  status = 200

[[redirects]]
  from = "/album/:albumId/track/:trackId"
  to = "/.netlify/functions/makeSharePage?album=:albumId&track=:trackId"
  status = 200

[[redirects]]
  from = "/track/:trackId"
  to = "/.netlify/functions/makeSharePage?track=:trackId"
  status = 200

[[redirects]]
  from = "/track/:trackId/:slug"
  to = "/.netlify/functions/makeSharePage?track=:trackId"
  status = 200

[[redirects]]
  from = "/embed/:trackId"
  to = "/.netlify/functions/embedPlayer?track=:trackId"
  status = 200

[[headers]]
  for = "/player.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/welcome-config.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/.netlify/functions/siteSettings"
  [headers.values]
    Cache-Control = "private, max-age=0, must-revalidate"
