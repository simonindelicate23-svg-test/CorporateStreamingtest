<!DOCTYPE html>
<html>
  <head>
    <title>Add Tracks — Admin</title>
    <link rel="stylesheet" href="/styles/admin.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="/admin/common.js" defer></script>
    <style>
      .artwork-preview { width: 100%; aspect-ratio: 1; border-radius: 10px; background: #f0ede8; border: 1px solid rgba(0,0,0,0.08); object-fit: cover; display: none; margin-top: 8px; }
      .artwork-preview.visible { display: block; }
      .track-row.card { position: relative; padding: 18px; }
      .track-row-remove { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #aaa; font-size: 1.1rem; cursor: pointer; box-shadow: none; padding: 2px 6px; }
      .track-row-remove:hover { color: #b42318; }
      .upload-btn-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
      .upload-btn-row input[type="file"] { flex: 1; min-width: 0; }
    </style>
  </head>
  <body>
    <div data-admin-header></div>
    <div class="admin-shell">
      <div data-admin-tabs></div>
      <div class="card">
        <div class="panel-title">
          <div>
            <h1 style="margin-bottom:4px;">Add a new release</h1>
            <p class="meta">Create a release and add its tracks in one flow.</p>
          </div>
          <a class="button-link button-secondary" href="edit.html">Track directory</a>
        </div>

        <form id="addTrackForm">

          <!-- ── Release metadata ──────────────────────────────────── -->
          <div class="form-section">
            <p class="form-section__title">Release</p>
            <div class="form-grid">
              <div>
                <label for="albumName">Release title</label>
                <input type="text" id="albumName" name="albumName" required placeholder="e.g. Debut EP" />
              </div>
              <div>
                <label for="artistName">Artist name</label>
                <input type="text" id="artistName" name="artistName" required placeholder="Loading from settings…" />
              </div>
              <div>
                <label for="genre">Genre</label>
                <input type="text" id="genre" name="genre" placeholder="e.g. Indie Folk" />
              </div>
              <div>
                <label for="year">Year</label>
                <input type="number" id="year" name="year" placeholder="2025" />
              </div>
              <div>
                <label for="albumId">Release ID <span class="meta" style="font-weight:400;">(optional, for share links)</span></label>
                <input type="text" id="albumId" name="albumId" placeholder="auto-generated from title" />
              </div>
              <div>
                <label for="bgcolor">Card background colour <span class="meta" style="font-weight:400;">(optional)</span></label>
                <input type="text" id="bgcolor" name="bgcolor" placeholder="#f0ede8" />
              </div>
            </div>
          </div>

          <!-- ── Artwork ───────────────────────────────────────────── -->
          <div class="form-section">
            <p class="form-section__title">Artwork</p>
            <div class="form-grid">
              <div>
                <label for="artworkUrl">Artwork URL</label>
                <input type="url" id="artworkUrl" name="artworkUrl" placeholder="https://…" />
                <div class="upload-btn-row">
                  <input type="file" id="artworkFile" accept="image/*" />
                  <button type="button" id="uploadArtworkButton" class="button-secondary button-sm">Upload</button>
                </div>
                <small id="artworkUploadStatus" class="meta"></small>
                <img id="artworkPreview" class="artwork-preview" alt="Artwork preview" />
              </div>
              <div style="display:flex;flex-direction:column;justify-content:flex-end;">
                <p class="meta" style="margin-bottom:8px;">The same image is used as the track artwork and album card artwork. Aspect ratio 1:1 recommended (e.g. 1000×1000).</p>
                <label style="display:flex;align-items:center;gap:8px;font-weight:400;margin-top:8px;">
                  <input type="checkbox" id="publishRelease" name="publishRelease" checked />
                  Publish release immediately
                </label>
              </div>
            </div>
          </div>

          <!-- ── Tracks ────────────────────────────────────────────── -->
          <div class="form-section">
            <p class="form-section__title">Tracks</p>
            <div id="tracksContainer" class="tracks-preview"></div>
            <div class="actions" style="margin-top:12px;">
              <button type="button" id="addTrackButton" class="button-secondary">+ Add track</button>
            </div>
          </div>

          <div class="actions" style="margin-top:28px; padding-top:24px; border-top:1px solid rgba(0,0,0,0.07);">
            <button type="submit" id="submitButton">Save release</button>
          </div>
          <div id="formStatus" class="status" style="display:none; margin-top:12px;"></div>
        </form>
      </div>
    </div>

    <script>
      const addTrackForm = document.getElementById('addTrackForm');
      const tracksContainer = document.getElementById('tracksContainer');
      const formStatus = document.getElementById('formStatus');
      const submitButton = document.getElementById('submitButton');
      const artworkPreview = document.getElementById('artworkPreview');
      let nextTrackNumber = 1;

      /* ── Artwork preview ──────────────────────────────────────── */
      function updateArtworkPreview(url) {
        if (!url) { artworkPreview.classList.remove('visible'); return; }
        artworkPreview.src = url;
        artworkPreview.onload = () => artworkPreview.classList.add('visible');
        artworkPreview.onerror = () => artworkPreview.classList.remove('visible');
      }

      document.getElementById('artworkUrl').addEventListener('input', (e) => updateArtworkPreview(e.target.value.trim()));

      /* ── Upload helpers ───────────────────────────────────────── */
      const CHUNK_SIZE = 3 * 1024 * 1024;
      const CHUNK_THRESHOLD = 4 * 1024 * 1024;

      const readSliceAsBase64 = (blob) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });

      async function uploadFileToMediaHost(file, folder, onProgress) {
        const endpoint = '/.netlify/functions/uploadMedia';
        const token = AdminDataStore.getToken();
        const headers = { 'Content-Type': 'application/json', ...(token ? { 'X-Admin-Token': token } : {}) };

        async function postChunk(payload) {
          const res = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(payload) });
          const result = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(result.message || `Upload failed (${res.status})`);
          return result;
        }

        if (file.size <= CHUNK_THRESHOLD) {
          const contentBase64 = await readSliceAsBase64(file);
          const result = await postChunk({ fileName: file.name, contentBase64, folder });
          if (!result?.url) throw new Error('No URL returned from upload');
          return result.url;
        }

        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
        const uploadId = `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
        let lastResult;
        for (let i = 0; i < totalChunks; i++) {
          const slice = file.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
          const chunkBase64 = await readSliceAsBase64(slice);
          lastResult = await postChunk({ fileName: file.name, folder, uploadId, chunkIndex: i, totalChunks, chunkBase64 });
          if (onProgress) onProgress(i + 1, totalChunks);
        }
        if (!lastResult?.url) throw new Error('No URL returned after final chunk');
        return lastResult.url;
      }

      /* ── Artwork upload ───────────────────────────────────────── */
      document.getElementById('uploadArtworkButton').addEventListener('click', async () => {
        const file = document.getElementById('artworkFile').files[0];
        const statusEl = document.getElementById('artworkUploadStatus');
        if (!file) { statusEl.textContent = 'Choose an image file first.'; return; }
        const btn = document.getElementById('uploadArtworkButton');
        btn.disabled = true; btn.textContent = 'Uploading…'; statusEl.textContent = 'Uploading…';
        try {
          const url = await uploadFileToMediaHost(file, 'artwork');
          document.getElementById('artworkUrl').value = url;
          updateArtworkPreview(url);
          statusEl.textContent = 'Uploaded.';
        } catch (e) { statusEl.textContent = e.message; }
        finally { btn.disabled = false; btn.textContent = 'Upload'; }
      });

      /* ── Server-side metadata proxy ───────────────────────────── */
      async function fetchMetadataFromServer(url) {
        return AdminDataStore.requestJson(
          '/.netlify/functions/getTrackMetadata?url=' + encodeURIComponent(url)
        );
      }

      async function autoFillTrackMetadata(row) {
        const urlInput = row.querySelector('.mp3Url');
        const nameInput = row.querySelector('.trackName');
        const durationInput = row.querySelector('.durationSeconds');
        const yearInput = row.querySelector('.trackYear');
        const genreInput = row.querySelector('.trackGenre');
        const hint = row.querySelector('.metadataHint');
        const url = urlInput.value.trim();
        if (!url) return;

        // Immediately infer name from URL filename
        if (!nameInput.value.trim()) nameInput.value = AdminDataStore.inferTrackNameFromUrl(url);

        hint.textContent = 'Fetching metadata…';
        try {
          const meta = await fetchMetadataFromServer(url);
          if (meta.trackName && !nameInput.value.trim()) nameInput.value = meta.trackName;
          else if (meta.trackName) nameInput.placeholder = meta.trackName; // show as hint
          if (meta.durationSeconds && !durationInput.value) durationInput.value = meta.durationSeconds;
          if (meta.year && !yearInput.value) yearInput.value = meta.year;
          if (meta.genre && !genreInput.value) genreInput.value = meta.genre;
          hint.textContent = meta.durationSeconds
            ? `Metadata ready — ${Math.floor(meta.durationSeconds / 60)}:${String(meta.durationSeconds % 60).padStart(2,'0')}`
            : 'Metadata read (no duration found).';
        } catch (_e) {
          // Fallback: duration-only via <audio> element (works for same-origin or permissive CORS)
          const seconds = await AdminDataStore.deriveDurationFromUrl(url);
          if (seconds && !durationInput.value) durationInput.value = seconds;
          hint.textContent = seconds
            ? `Duration ${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2,'0')} (ID3 tags unavailable)`
            : 'Could not read metadata.';
        }
      }

      /* ── Track rows ───────────────────────────────────────────── */
      function createTrackRow() {
        const num = nextTrackNumber++;
        const wrapper = document.createElement('div');
        wrapper.className = 'track-row card';
        wrapper.innerHTML = `
          <button type="button" class="track-row-remove" title="Remove track" aria-label="Remove track">&#10005;</button>
          <div class="form-grid">
            <div><label>Track name<input type="text" class="trackName" required /></label></div>
            <div>
              <label>MP3 URL<input type="url" class="mp3Url" required /></label>
              <div class="upload-btn-row">
                <input type="file" class="trackFile" accept="audio/*" />
                <button type="button" class="button-secondary button-sm uploadTrackBtn">Upload</button>
              </div>
              <small class="meta trackUploadStatus"></small>
            </div>
            <div><label>Order<input type="number" class="trackNumber" min="1" value="${num}" required /></label></div>
            <div><label>Duration (s)<input type="number" class="durationSeconds" /></label></div>
            <div><label>Year<input type="number" class="trackYear" /></label></div>
            <div><label>Genre<input type="text" class="trackGenre" /></label></div>
            <div style="grid-column:1/-1"><label>Notes / lyrics<textarea class="trackText" style="min-height:60px;"></textarea></label></div>
          </div>
          <small class="meta metadataHint" style="margin-top:6px;display:block;">Enter an MP3 URL to auto-fill metadata.</small>`;

        wrapper.querySelector('.track-row-remove').addEventListener('click', () => {
          if (tracksContainer.querySelectorAll('.track-row').length > 1) wrapper.remove();
        });

        wrapper.querySelector('.mp3Url').addEventListener('change', () => {
          autoFillTrackMetadata(wrapper);
          const url = wrapper.querySelector('.mp3Url').value.trim();
          if (url) warnIfDuplicate(url, wrapper.querySelector('.trackUploadStatus'));
        });

        wrapper.querySelector('.uploadTrackBtn').addEventListener('click', async () => {
          const fileInput = wrapper.querySelector('.trackFile');
          const urlInput = wrapper.querySelector('.mp3Url');
          const uploadState = wrapper.querySelector('.trackUploadStatus');
          const file = fileInput.files[0];
          if (!file) { uploadState.textContent = 'Choose an audio file first.'; return; }

          // Warn on filename match before uploading
          const filenameLower = file.name.toLowerCase();
          const filenameMatch = existingTracks.find(t => {
            const existing = (t.mp3Url || '').split('/').pop().replace(/^\d+-/, '').toLowerCase();
            return existing && existing === filenameLower;
          });
          if (filenameMatch) {
            uploadState.style.color = '#856404';
            uploadState.textContent = `⚠ A file named "${file.name}" may already exist as "${filenameMatch.trackName || file.name}" in "${filenameMatch.albumName || 'catalog'}". Uploading anyway…`;
          }

          const btn = wrapper.querySelector('.uploadTrackBtn');
          btn.disabled = true; btn.textContent = 'Uploading…';
          if (!filenameMatch) uploadState.textContent = 'Uploading…';
          try {
            const url = await uploadFileToMediaHost(file, 'audio', (done, total) => {
              uploadState.textContent = `Uploading… ${done}/${total} chunks`;
            });
            urlInput.value = url;
            uploadState.style.color = '';
            uploadState.textContent = 'Uploaded.';
            warnIfDuplicate(url, uploadState);
            autoFillTrackMetadata(wrapper);
          } catch (e) { uploadState.style.color = ''; uploadState.textContent = e.message; }
          finally { btn.disabled = false; btn.textContent = 'Upload'; }
        });

        return wrapper;
      }

      document.getElementById('addTrackButton').addEventListener('click', () => tracksContainer.appendChild(createTrackRow()));

      /* ── Submit ───────────────────────────────────────────────── */
      addTrackForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        submitButton.textContent = 'Saving…';
        formStatus.style.display = 'none';

        const album = {
          albumName: document.getElementById('albumName').value,
          artistName: document.getElementById('artistName').value,
          artworkUrl: document.getElementById('artworkUrl').value,
          albumArtworkUrl: document.getElementById('artworkUrl').value,
          albumId: document.getElementById('albumId').value,
          genre: document.getElementById('genre').value,
          year: document.getElementById('year').value,
          bgcolor: document.getElementById('bgcolor').value,
          published: document.getElementById('publishRelease').checked,
        };

        const tracks = [...tracksContainer.querySelectorAll('.track-row')].map((row) => ({
          trackName: row.querySelector('.trackName').value,
          mp3Url: row.querySelector('.mp3Url').value,
          trackNumber: row.querySelector('.trackNumber').value,
          durationSeconds: row.querySelector('.durationSeconds').value,
          year: row.querySelector('.trackYear').value,
          genre: row.querySelector('.trackGenre').value,
          trackText: row.querySelector('.trackText').value,
        }));

        try {
          await AdminDataStore.requestJson('/.netlify/functions/catalog', {
            method: 'POST',
            body: JSON.stringify({ action: 'addReleaseTracks', album, tracks }),
          });
          AdminDataStore.invalidateCache(['tracks', 'albums']);
          formStatus.textContent = `Release "${album.albumName}" saved with ${tracks.length} track${tracks.length !== 1 ? 's' : ''}.`;
          formStatus.className = 'status';
          formStatus.style.display = 'block';
          addTrackForm.reset();
          document.getElementById('artworkUrl').value = '';
          updateArtworkPreview('');
          tracksContainer.innerHTML = '';
          nextTrackNumber = 1;
          tracksContainer.appendChild(createTrackRow());
          // Reload artist from settings
          loadArtistDefault();
        } catch (error) {
          formStatus.textContent = `Save failed: ${error.message}`;
          formStatus.className = 'status error';
          formStatus.style.display = 'block';
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = 'Save release';
        }
      });

      /* ── Duplicate detection ──────────────────────────────────── */
      let existingTracks = [];

      async function loadExistingTracks() {
        try {
          existingTracks = await AdminDataStore.fetchJsonCached('/.netlify/functions/catalog?resource=tracks', 'tracks');
        } catch (_e) { /* non-fatal */ }
      }

      function findDuplicateTrack(url) {
        if (!url || !existingTracks.length) return null;
        const exact = existingTracks.find(t => t.mp3Url === url);
        if (exact) return exact;
        const filename = url.split('/').pop().replace(/^\d+-/, '').toLowerCase();
        if (!filename) return null;
        return existingTracks.find(t => {
          const existing = (t.mp3Url || '').split('/').pop().replace(/^\d+-/, '').toLowerCase();
          return existing && existing === filename;
        }) || null;
      }

      function warnIfDuplicate(url, statusEl) {
        const dup = findDuplicateTrack(url);
        if (dup) {
          statusEl.style.color = '#856404';
          statusEl.textContent = `⚠ Possible duplicate: "${dup.trackName || url}" already in "${dup.albumName || 'catalog'}".`;
        }
      }

      /* ── Default artist from site settings ───────────────────── */
      async function loadArtistDefault() {
        try {
          const settings = await AdminDataStore.fetchJsonCached('/.netlify/functions/siteSettings', 'site-settings');
          const artistField = document.getElementById('artistName');
          if (!artistField.value.trim()) {
            artistField.value = settings.brandName || settings.siteTitle || '';
          }
          if (!artistField.placeholder || artistField.placeholder === 'Loading from settings…') {
            artistField.placeholder = settings.brandName || settings.siteTitle || 'Artist name';
          }
        } catch (_e) { /* silently ignore */ }
      }

      /* ── Init ─────────────────────────────────────────────────── */
      window.addEventListener('DOMContentLoaded', () => {
        AdminDataStore.mountHeader();
        AdminDataStore.mountTabs();
        tracksContainer.appendChild(createTrackRow());
        loadArtistDefault();
        loadExistingTracks();
      });
    </script>
  </body>
</html>
