<!DOCTYPE html>
<html>
  <head>
    <title>Add Tracks</title>
    <link rel="stylesheet" href="/styles/admin.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="/admin/common.js" defer></script>
  </head>
  <body>
    <div class="admin-shell">
      <div data-admin-tabs></div>
      <div class="card">
        <div class="panel-title">
          <div>
            <h1>Add tracks</h1>
            <p class="meta">Create a release and add tracks in one flow. Metadata (duration + title hints) is inferred automatically when an MP3 URL is set.</p>
          </div>
          <a class="button-link button-secondary" href="edit.html">Open directory</a>
        </div>

        <form id="addTrackForm">
          <div class="form-grid">
            <div><label for="albumName">Release title</label><input type="text" id="albumName" name="albumName" required /></div>
            <div><label for="albumId">Release ID</label><input type="text" id="albumId" name="albumId" placeholder="slug" /></div>
            <div><label for="artistName">Artist name</label><input type="text" id="artistName" name="artistName" value="Simon Indelicate" required /></div>
            <div><label for="artworkUrl">Artwork URL</label><input type="url" id="artworkUrl" name="artworkUrl" /></div>
            <div><label for="albumArtworkUrl">Player artwork URL</label><input type="url" id="albumArtworkUrl" name="albumArtworkUrl" /></div>
            <div><label for="pinCode">PIN Code</label><input type="password" id="pinCode" name="pinCode" required /></div>
          </div>

          <h3>Tracks</h3>
          <div id="tracksContainer" class="tracks-preview"></div>
          <button type="button" id="addTrackButton">+ Add track</button>
          <div class="actions" style="margin-top:16px;"><button type="submit" id="submitButton">Save release</button></div>
          <div id="formStatus" class="status" style="display:none;"></div>
        </form>
      </div>
    </div>

    <script>
      const addTrackForm = document.getElementById('addTrackForm');
      const tracksContainer = document.getElementById('tracksContainer');
      const addTrackButton = document.getElementById('addTrackButton');
      const formStatus = document.getElementById('formStatus');
      const submitButton = document.getElementById('submitButton');
      let nextTrackNumber = 1;

      function showStatus(message, isError) {
        formStatus.textContent = message;
        formStatus.style.display = 'block';
        formStatus.style.background = isError ? '#fff3f3' : '#f1f7ff';
        formStatus.style.borderColor = isError ? '#f1aeb5' : '#d5e5ff';
        formStatus.style.color = isError ? '#8c1d2e' : '#1f4b99';
      }

      async function autoFillTrackMetadata(row) {
        const urlInput = row.querySelector('.mp3Url');
        const nameInput = row.querySelector('.trackName');
        const durationInput = row.querySelector('.durationSeconds');
        const hint = row.querySelector('.metadataHint');
        const url = urlInput.value.trim();
        if (!url) return;

        if (!nameInput.value.trim()) {
          nameInput.value = AdminDataStore.inferTrackNameFromUrl(url);
        }

        hint.textContent = 'Reading metadata…';
        const seconds = await AdminDataStore.deriveDurationFromUrl(url);
        if (seconds && !durationInput.value) durationInput.value = seconds;
        hint.textContent = seconds ? `Metadata ready (${seconds}s)` : 'Metadata lookup skipped (source blocked or missing headers).';
      }

      function createTrackRow() {
        const wrapper = document.createElement('div');
        wrapper.className = 'track-row card';
        wrapper.innerHTML = `
          <label>Track name<input type="text" class="trackName" required /></label>
          <label>MP3 URL<input type="url" class="mp3Url" required /></label>
          <label>Order<input type="number" class="trackNumber" min="1" value="${nextTrackNumber}" required /></label>
          <label>Duration (s)<input type="number" class="durationSeconds" /></label>
          <label>Year<input type="number" class="trackYear" /></label>
          <label>Genre<input type="text" class="trackGenre" /></label>
          <label>Track medium<input type="text" class="trackMedium" /></label>
          <label>Track notes<textarea class="trackText"></textarea></label>
          <small class="meta metadataHint">Metadata will auto-load from MP3 URL.</small>`;

        wrapper.querySelector('.mp3Url').addEventListener('change', () => autoFillTrackMetadata(wrapper));
        nextTrackNumber++;
        return wrapper;
      }

      function addTrackRow() { tracksContainer.appendChild(createTrackRow()); }
      addTrackButton.addEventListener('click', addTrackRow);
      addTrackRow();

      addTrackForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        submitButton.textContent = 'Saving…';

        const formData = new FormData(addTrackForm);
        if (formData.get('pinCode') !== '1310') {
          showStatus('Incorrect PIN code', true);
          submitButton.disabled = false;
          submitButton.textContent = 'Save release';
          return;
        }

        const album = {
          albumName: formData.get('albumName'), artistName: formData.get('artistName'), artworkUrl: formData.get('artworkUrl'),
          albumId: formData.get('albumId'), albumArtworkUrl: formData.get('albumArtworkUrl')
        };

        const tracks = [...tracksContainer.querySelectorAll('.track-row')].map((row) => ({
          trackName: row.querySelector('.trackName').value,
          mp3Url: row.querySelector('.mp3Url').value,
          trackNumber: row.querySelector('.trackNumber').value,
          durationSeconds: row.querySelector('.durationSeconds').value,
          year: row.querySelector('.trackYear').value,
          genre: row.querySelector('.trackGenre').value,
          trackMedium: row.querySelector('.trackMedium').value,
          trackText: row.querySelector('.trackText').value
        }));

        try {
          await fetch('/.netlify/functions/addTrack', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ album, tracks }) });
          AdminDataStore.invalidateCache(['tracks', 'albums']);
          showStatus('Release and tracks saved.', false);
          addTrackForm.reset();
          tracksContainer.innerHTML = '';
          nextTrackNumber = 1;
          addTrackRow();
        } catch (error) {
          console.error(error);
          showStatus('Save failed.', true);
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = 'Save release';
        }
      });

      window.addEventListener('DOMContentLoaded', () => AdminDataStore.mountTabs());
    </script>
  </body>
</html>
