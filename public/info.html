<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About this site</title>
    <link rel="stylesheet" href="/styles/style.css" />
    <style>
      .info-page { max-width: 720px; margin: 3rem auto; padding: 2rem; background: var(--surface-raised, #0e0d12); color: var(--text-primary, #f5f5f5); border-radius: 16px; }
      .info-page p,.info-page li { line-height: 1.7; }
    </style>
    <script src="/site-settings.js" defer></script>
  </head>
  <body>
    <main class="info-page">
      <header>
        <p class="eyebrow" id="aboutEyebrow">Independent music player</p>
        <h1 id="aboutTitle">About this site</h1>
      </header>
      <div id="aboutContent"></div>
    </main>
    <script>
      window.addEventListener('DOMContentLoaded', async () => {
        const settings = await window.SiteSettings.loadSiteSettings();
        window.SiteSettings.applyFontPair(settings.fontPair);
        document.title = settings.aboutPageTitle || 'About this site';
        document.getElementById('aboutTitle').textContent = settings.aboutPageTitle || 'About this site';
        document.getElementById('aboutEyebrow').textContent = settings.aboutPageEyebrow || 'Independent music player';
        document.getElementById('aboutContent').innerHTML = settings.aboutPageContent || '<section><h2>About</h2><p>Use Site Settings to edit this page content.</p></section>';
      });
    </script>
  </body>
</html>
