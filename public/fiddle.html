<!DOCTYPE html>
<html>
  <head>
    <title>Edit Track — Admin</title>
    <link rel="stylesheet" href="/styles/admin.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="/admin/common.js" defer></script>
  </head>
  <body>
    <div data-admin-header></div>
    <div class="admin-shell">
      <div data-admin-tabs></div>
      <div class="card">
        <h1>Edit Track</h1>
        <form id="editForm">
          <input type="hidden" id="_id" />
          <div class="form-grid">
            <div>
              <label>Track Name</label>
              <input type="text" id="trackName" />
            </div>
            <div>
              <label>Artist Name</label>
              <input type="text" id="artistName" />
            </div>
            <div>
              <label>Album Name</label>
              <input type="text" id="albumName" />
            </div>
            <div>
              <label>Album ID</label>
              <input type="text" id="albumId" />
            </div>
            <div>
              <label>Artwork URL</label>
              <input type="text" id="artworkUrl" />
              <div class="inline-actions" style="margin-top:8px;">
                <input type="file" id="artworkFile" accept="image/*" style="flex:1;min-width:0;" />
                <button type="button" id="uploadArtwork" class="button-secondary button-sm">Upload</button>
              </div>
              <small id="artworkUploadStatus" class="meta"></small>
              <img id="artworkPreview" style="width:100%;aspect-ratio:1;border-radius:10px;background:#f0ede8;border:1px solid rgba(0,0,0,0.08);object-fit:cover;display:none;margin-top:8px;" alt="Artwork preview" />
              <div id="embeddedArtSuggestion" style="display:none;margin-top:8px;padding:10px 12px;background:#f1f7ff;border:1px solid #d5e5ff;border-radius:6px;">
                <img id="embeddedArtPreview" style="width:100%;aspect-ratio:1;border-radius:6px;object-fit:cover;margin-bottom:8px;" alt="Embedded artwork" />
                <button type="button" id="useEmbeddedArtBtn" class="button-link button-secondary" style="width:100%;">Upload embedded art as artwork</button>
                <small id="useEmbeddedArtStatus" class="meta" style="display:block;margin-top:4px;"></small>
              </div>
            </div>
            <div>
              <label>Album Artwork URL</label>
              <input type="text" id="albumArtworkUrl" />
            </div>
            <div>
              <label>MP3 URL</label>
              <div class="inline-field">
                <input type="text" id="mp3Url" />
                <button type="button" id="fetchMetadata" class="button-secondary">Fetch metadata</button>
              </div>
              <label style="margin-top:8px;">Replace audio file</label>
              <div class="inline-field">
                <input type="file" id="audioFile" accept="audio/*" />
                <button type="button" id="uploadAudio" class="button-secondary">Upload audio</button>
              </div>
              <small id="audioUploadStatus" class="meta"></small>
            </div>
            <div>
              <label>Track Number</label>
              <input type="number" id="trackNumber" />
            </div>
            <div>
              <label>Duration (seconds)</label>
              <input type="number" id="durationSeconds" />
            </div>
            <div>
              <label>Year</label>
              <input type="number" id="year" />
            </div>
            <div>
              <label>Genre</label>
              <input type="text" id="genre" />
            </div>
            <div>
              <label>Play Count</label>
              <input type="number" id="playCount" />
            </div>
            <div>
              <label>Track Medium</label>
              <input type="text" id="trackMedium" />
            </div>
            <div>
              <label>Background Colour</label>
              <input type="text" id="bgcolor" placeholder="#ffffff" />
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="checkbox" id="published" />
              <label for="published" style="margin:0;">Published?</label>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="checkbox" id="fav" />
              <label for="fav" style="margin:0;">Favourite?</label>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="checkbox" id="paid" />
              <label for="paid" style="margin:0;">Paid / members only &#128274;</label>
            </div>
          </div>
          <label>Track Text</label>
          <textarea id="trackText"></textarea>
          <div class="actions" style="margin-top:16px;">
            <button type="submit">Update</button>
            <a class="button-link button-secondary" href="edit.html">Back to directory</a>
          </div>
          <div id="status" class="status" style="display:none;margin-top:12px;"></div>
        </form>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      const status = document.getElementById('status');
      const fetchMetadataBtn = document.getElementById('fetchMetadata');
      const uploadArtworkBtn = document.getElementById('uploadArtwork');
      const uploadAudioBtn = document.getElementById('uploadAudio');

      function buildUploadErrorMessage(result, fallback) {
        if (!result) return fallback;
        return result.detail || result.message || fallback;
      }

      async function parseUploadResponse(response) {
        const rawText = await response.text();
        const contentType = String(response.headers.get('content-type') || '').toLowerCase();
        const isLikelyJson = contentType.includes('application/json') || rawText.trim().startsWith('{') || rawText.trim().startsWith('[');
        if (!isLikelyJson) {
          const preview = rawText.replace(/\s+/g, ' ').trim().slice(0, 140);
          throw new Error(`Upload endpoint returned non-JSON response (status ${response.status}${preview ? `, body starts with: ${preview}` : ''}).`);
        }

        try {
          return JSON.parse(rawText || '{}');
        } catch (_error) {
          throw new Error(`Upload endpoint returned invalid JSON (status ${response.status}).`);
        }
      }

      const CHUNK_SIZE = 3 * 1024 * 1024;       // 3 MB per chunk
      const CHUNK_THRESHOLD = 4 * 1024 * 1024;  // use chunked above 4 MB
      const IMAGE_EXTS = new Set(['.jpg', '.jpeg', '.png', '.webp', '.gif', '.avif']);

      const readSliceAsBase64 = (blob) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });

      // null = unknown, true = R2 presign confirmed, false = FTP/unavailable
      let _presignAvailable = null;
      let _presignProbe = Promise.resolve();

      window.addEventListener('DOMContentLoaded', () => {
        const tok = AdminDataStore.getToken();
        if (!tok) return;
        _presignProbe = fetch('/.netlify/functions/uploadMedia', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': tok },
          body: JSON.stringify({ action: 'presign', fileName: '_probe_.bin', folder: '_probe_' }),
        }).then(res => {
          if (res.ok || res.status === 401) return;
          _presignAvailable = false;
        }).catch(() => {});
      });

      async function uploadFileToMediaHost(file, folder) {
        const endpoint = '/.netlify/functions/uploadMedia';
        const token = AdminDataStore.getToken();
        const headers = { 'Content-Type': 'application/json', ...(token ? { 'X-Admin-Token': token } : {}) };

        async function postChunk(payload) {
          const res = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(payload) });
          const result = await parseUploadResponse(res);
          if (!res.ok) throw new Error(buildUploadErrorMessage(result, `Upload failed (${res.status})`));
          return result;
        }

        await _presignProbe;

        const ext = '.' + file.name.split('.').pop().toLowerCase();

        // R2 path: presigned URL — browser uploads directly, bypassing Netlify body limit
        if (!IMAGE_EXTS.has(ext) && _presignAvailable !== false) {
          const presignRes = await fetch(endpoint, {
            method: 'POST',
            headers,
            body: JSON.stringify({ action: 'presign', fileName: file.name, folder }),
          });
          if (presignRes.ok) {
            const { presignedUrl, publicUrl } = await presignRes.json().catch(() => ({}));
            if (presignedUrl && publicUrl) {
              let putRes;
              try {
                putRes = await fetch(presignedUrl, {
                  method: 'PUT',
                  body: file,
                  headers: { 'Content-Type': file.type || 'application/octet-stream' },
                });
              } catch (_corsErr) {
                throw new Error(
                  `Upload to R2 failed — CORS policy missing or incorrect. ` +
                  `Open your R2 bucket → Settings → CORS Policy and allow PUT from ${location.origin}.`
                );
              }
              if (!putRes.ok) throw new Error(`Upload to R2 failed (${putRes.status}).`);
              _presignAvailable = true;
              return publicUrl;
            }
          } else {
            _presignAvailable = false;
          }
        }

        // FTP / small-file path: send base64 via Netlify function
        if (file.size <= CHUNK_THRESHOLD) {
          const contentBase64 = await readSliceAsBase64(file);
          const result = await postChunk({ fileName: file.name, contentBase64, folder });
          if (!result?.url) throw new Error('No URL returned from upload');
          return result.url;
        }

        // Chunked path: split large files to stay within Netlify's 6 MB body limit
        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
        const uploadId = `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
        let lastResult;
        for (let i = 0; i < totalChunks; i++) {
          const slice = file.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
          const chunkBase64 = await readSliceAsBase64(slice);
          lastResult = await postChunk({ fileName: file.name, folder, uploadId, chunkIndex: i, totalChunks, chunkBase64 });
        }
        if (!lastResult?.url) throw new Error('No URL returned after final chunk');
        return lastResult.url;
      }

      function updateArtworkPreview(url) {
        const img = document.getElementById('artworkPreview');
        if (!img) return;
        if (!url) { img.style.display = 'none'; return; }
        img.src = url;
        img.onload = () => { img.style.display = 'block'; };
        img.onerror = () => { img.style.display = 'none'; };
      }

      async function uploadReplacement(kind) {
        const isArtwork = kind === 'artwork';
        const fileInput = document.getElementById(isArtwork ? 'artworkFile' : 'audioFile');
        const button = document.getElementById(isArtwork ? 'uploadArtwork' : 'uploadAudio');
        const statusNode = document.getElementById(isArtwork ? 'artworkUploadStatus' : 'audioUploadStatus');
        const file = fileInput.files[0];

        if (!file) {
          statusNode.textContent = `Choose a ${isArtwork ? 'image' : 'audio'} file first.`;
          return;
        }

        button.disabled = true;
        const originalLabel = button.textContent;
        button.textContent = 'Uploading…';
        statusNode.textContent = 'Uploading…';

        try {
          const uploadedUrl = await uploadFileToMediaHost(file, isArtwork ? 'artwork' : 'audio');
          if (isArtwork) {
            document.getElementById('artworkUrl').value = uploadedUrl;
            document.getElementById('albumArtworkUrl').value = uploadedUrl;
            updateArtworkPreview(uploadedUrl);
          } else {
            document.getElementById('mp3Url').value = uploadedUrl;
          }
          statusNode.textContent = 'Uploaded.';
        } catch (error) {
          statusNode.textContent = error.message;
        } finally {
          button.disabled = false;
          button.textContent = originalLabel;
        }
      }


      function populateFieldsFromMetadata(metadata) {
        // Server proxy uses trackName; ID3 lib uses title — accept both
        const name = metadata.trackName || metadata.title;
        const artist = metadata.artistName || metadata.artist;
        const album = metadata.albumName || metadata.album;
        if (name) document.getElementById('trackName').value = name;
        if (artist) document.getElementById('artistName').value = artist;
        if (album) document.getElementById('albumName').value = album;
        if (metadata.trackNumber) document.getElementById('trackNumber').value = metadata.trackNumber;
        if (metadata.year) document.getElementById('year').value = metadata.year;
        if (metadata.genre) document.getElementById('genre').value = metadata.genre;
        if (metadata.durationSeconds) {
          document.getElementById('durationSeconds').value = Math.round(metadata.durationSeconds);
        }
      }

      // Upload a base64 data URL directly to the media host (no File object needed).
      async function uploadDataUrl(dataUrl, fileName) {
        const b64 = dataUrl.split(',')[1];
        const token = AdminDataStore.getToken();
        const response = await fetch('/.netlify/functions/uploadMedia', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...(token ? { 'X-Admin-Token': token } : {}) },
          body: JSON.stringify({ fileName, contentBase64: b64, folder: 'artwork' }),
        });
        const result = await response.json();
        if (!result?.url) throw new Error(result?.message || 'Upload failed');
        return result.url;
      }

      function showEmbeddedArtSuggestion(artworkDataUrl, trackTitle) {
        const suggestion = document.getElementById('embeddedArtSuggestion');
        const preview = document.getElementById('embeddedArtPreview');
        const btn = document.getElementById('useEmbeddedArtBtn');
        const statusEl = document.getElementById('useEmbeddedArtStatus');
        preview.src = artworkDataUrl;
        suggestion.style.display = 'block';
        btn.onclick = async () => {
          btn.disabled = true;
          btn.textContent = 'Uploading…';
          statusEl.textContent = '';
          try {
            const mimeType = artworkDataUrl.split(';')[0].split(':')[1] || 'image/jpeg';
            const ext = mimeType.split('/')[1] || 'jpg';
            const safeName = (trackTitle || 'artwork').replace(/[^a-z0-9]/gi, '-').toLowerCase().slice(0, 40);
            const url = await uploadDataUrl(artworkDataUrl, `${safeName}.${ext}`);
            document.getElementById('artworkUrl').value = url;
            if (!document.getElementById('albumArtworkUrl').value.trim()) {
              document.getElementById('albumArtworkUrl').value = url;
            }
            updateArtworkPreview(url);
            suggestion.style.display = 'none';
          } catch (err) {
            statusEl.textContent = err.message;
          } finally {
            btn.disabled = false;
            btn.textContent = 'Upload embedded art as artwork';
          }
        };
      }

      async function fetchAudioMetadata(url) {
        status.style.display = 'block';
        status.textContent = 'Fetching metadata…';
        status.className = 'status';

        try {
          // Server-side proxy — no CORS issues regardless of hosting.
          // Always request embedded artwork on this page (single track, explicit button press).
          const meta = await AdminDataStore.requestJson(
            '/.netlify/functions/getTrackMetadata?includeArtwork=true&url=' + encodeURIComponent(url)
          );
          return meta;
        } catch (error) {
          status.textContent = 'Could not fetch metadata: ' + error.message;
          status.className = 'status error';
          throw error;
        }
      }

      // Include the admin token so the backend returns the full track (with mp3Url).
      const _adminToken = sessionStorage.getItem('admin-token') || '';
      fetch('/.netlify/functions/catalog?resource=track&id=' + id, {
        headers: _adminToken ? { 'X-Admin-Token': _adminToken } : {},
      })
        .then(response => response.json())
        .then(track => {
          document.getElementById('_id').value = track._id;
          document.getElementById('trackName').value = track.trackName || '';
          document.getElementById('artistName').value = track.artistName || '';
          document.getElementById('albumName').value = track.albumName || '';
          document.getElementById('albumId').value = track.albumId || '';
          document.getElementById('artworkUrl').value = track.artworkUrl || '';
          updateArtworkPreview(track.artworkUrl || '');
          document.getElementById('artworkUrl').addEventListener('input', (e) => updateArtworkPreview(e.target.value.trim()));
          document.getElementById('albumArtworkUrl').value = track.albumArtworkUrl || '';
          document.getElementById('mp3Url').value = track.mp3Url || '';
          document.getElementById('trackNumber').value = track.trackNumber || '';
          document.getElementById('durationSeconds').value = track.durationSeconds || '';
          document.getElementById('year').value = track.year || '';
          document.getElementById('genre').value = track.genre || '';
          document.getElementById('playCount').value = track.playCount || '';
          document.getElementById('trackText').value = track.trackText || '';
          document.getElementById('trackMedium').value = track.trackMedium || '';
          document.getElementById('bgcolor').value = track.bgcolor || '';
          document.getElementById('published').checked = track.published !== false;
          document.getElementById('fav').checked = track.fav === true || track.fav === 'true';
          document.getElementById('paid').checked = track.paid === true || track.paid === 'true';

          document.getElementById('editForm').onsubmit = event => {
            event.preventDefault();

            const updatedTrack = {
              _id: document.getElementById('_id').value
            };

            if (track.trackName !== document.getElementById('trackName').value) {
              updatedTrack.trackName = document.getElementById('trackName').value;
            }
            if (track.artistName !== document.getElementById('artistName').value) {
              updatedTrack.artistName = document.getElementById('artistName').value;
            }
            if (track.albumName !== document.getElementById('albumName').value) {
              updatedTrack.albumName = document.getElementById('albumName').value;
            }
            if (track.albumId !== document.getElementById('albumId').value) {
              updatedTrack.albumId = document.getElementById('albumId').value;
            }
            if (track.artworkUrl !== document.getElementById('artworkUrl').value) {
              updatedTrack.artworkUrl = document.getElementById('artworkUrl').value;
            }
            if (track.albumArtworkUrl !== document.getElementById('albumArtworkUrl').value) {
              updatedTrack.albumArtworkUrl = document.getElementById('albumArtworkUrl').value;
            }
            if (track.mp3Url !== document.getElementById('mp3Url').value) {
              updatedTrack.mp3Url = document.getElementById('mp3Url').value;
            }
            if (track.trackNumber != document.getElementById('trackNumber').value) {
              updatedTrack.trackNumber = document.getElementById('trackNumber').value;
            }
            if (track.durationSeconds != document.getElementById('durationSeconds').value) {
              updatedTrack.durationSeconds = document.getElementById('durationSeconds').value;
              updatedTrack.duration = document.getElementById('durationSeconds').value;
            }
            if (track.year != document.getElementById('year').value) {
              updatedTrack.year = document.getElementById('year').value;
            }
            if (track.genre !== document.getElementById('genre').value) {
              updatedTrack.genre = document.getElementById('genre').value;
            }
            if (track.playCount != document.getElementById('playCount').value) {
              updatedTrack.playCount = document.getElementById('playCount').value;
            }
            if (track.trackText !== document.getElementById('trackText').value) {
              updatedTrack.trackText = document.getElementById('trackText').value;
            }
            if (track.trackMedium !== document.getElementById('trackMedium').value) {
              updatedTrack.trackMedium = document.getElementById('trackMedium').value;
            }
            if (track.bgcolor !== document.getElementById('bgcolor').value) {
              updatedTrack.bgcolor = document.getElementById('bgcolor').value;
            }
            const currentlyPublished = track.published !== false;
            if (currentlyPublished !== document.getElementById('published').checked) {
              updatedTrack.published = document.getElementById('published').checked;
            }
            updatedTrack.fav = document.getElementById('fav').checked;
            updatedTrack.paid = document.getElementById('paid').checked;

            AdminDataStore.requestJson('/.netlify/functions/catalog', {
              method: 'POST',
              body: JSON.stringify({ action: 'updateTrack', id: updatedTrack._id, updates: updatedTrack })
            })
              .then(() => {
                status.textContent = 'Track updated.';
                status.className = 'status';
                status.style.display = 'block';
              })
              .catch((error) => {
                status.textContent = 'Error updating track: ' + error.message;
                status.className = 'status error';
                status.style.display = 'block';
              });
          };

          fetchMetadataBtn.addEventListener('click', async () => {
            const url = document.getElementById('mp3Url').value.trim();
            if (!url) {
              status.textContent = 'Please provide an MP3 URL first.';
              status.style.display = 'block';
              status.style.background = '#fff3f3';
              status.style.borderColor = '#f1aeb5';
              return;
            }

            try {
              const metadata = await fetchAudioMetadata(url);
              populateFieldsFromMetadata(metadata);
              // Show embedded artwork suggestion if the artwork URL field is empty
              document.getElementById('embeddedArtSuggestion').style.display = 'none';
              if (metadata.artworkDataUrl && !document.getElementById('artworkUrl').value.trim()) {
                showEmbeddedArtSuggestion(
                  metadata.artworkDataUrl,
                  document.getElementById('trackName').value || 'artwork'
                );
              }
              status.textContent = 'Metadata populated from audio file.';
              status.style.background = '#f1f7ff';
              status.style.borderColor = '#d5e5ff';
            } catch (error) {
              console.error(error);
            }
          });

          uploadArtworkBtn.addEventListener('click', () => uploadReplacement('artwork'));
          uploadAudioBtn.addEventListener('click', async () => {
            await uploadReplacement('audio');
            const url = document.getElementById('mp3Url').value.trim();
            if (!url) return;
            try {
              const metadata = await fetchAudioMetadata(url);
              populateFieldsFromMetadata(metadata);
            } catch (_error) {
              // ignore metadata parsing errors after upload
            }
          });
        });

      window.addEventListener('DOMContentLoaded', () => {
        AdminDataStore.mountHeader();
        AdminDataStore.mountTabs();
      });
    </script>
  </body>
</html>
