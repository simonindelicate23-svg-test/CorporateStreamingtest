<!DOCTYPE html>
<html>
  <head>
    <title>Track Directory — Admin</title>
    <link rel="stylesheet" href="/styles/admin.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="/admin/common.js" defer></script>
  </head>
  <body>
    <div data-admin-header></div>
    <div class="admin-shell">
      <div data-admin-tabs></div>
      <div class="card">
        <div class="panel-title">
          <div>
            <h1 style="margin-bottom:4px;">Track directory</h1>
            <p class="meta">All tracks across all releases. Filter to find, then edit or toggle publish state.</p>
          </div>
          <a class="button-link" href="insert.html">+ Add release</a>
        </div>
        <div class="form-grid"><div><label for="search">Filter</label><input id="search" type="text" placeholder="Track / album / artist" /></div></div>
        <div style="margin-top:12px;">
          <button id="fillDurationsBtn" class="button-link button-secondary">Fill missing durations</button>
          <span id="fillDurationsHint" class="meta" style="margin-left:10px;"></span>
        </div>
        <div id="fillDurationsResults" style="display:none;margin-top:12px;"></div>
        <div id="status" class="status" style="display:none;"></div>
      </div>
      <div id="bulkBar" style="display:none; background:var(--accent-subtle,#eef4ff); border:1px solid var(--border,#d0d7de); border-radius:8px; padding:10px 16px; margin-bottom:8px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <span id="bulkCount" style="font-weight:600; font-size:0.9rem; flex:1;"></span>
        <button id="bulkPublishBtn" class="button-link button-secondary" style="font-size:0.85rem;">Publish selected</button>
        <button id="bulkUnpublishBtn" class="button-link button-secondary" style="font-size:0.85rem;">Unpublish selected</button>
        <button id="bulkClearBtn" class="button-link" style="font-size:0.85rem; color:#666;">Clear selection</button>
      </div>
      <div class="card">
        <table class="table" id="tracksTable">
          <thead>
            <tr>
              <th style="width:36px;"><input type="checkbox" id="selectAll" title="Select all visible" /></th>
              <th>Track</th><th>Album</th><th>Order</th><th>Published</th><th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script>
      const tableBody = document.querySelector('#tracksTable tbody');
      const searchInput = document.getElementById('search');
      const status = document.getElementById('status');
      const bulkBar = document.getElementById('bulkBar');
      const bulkCount = document.getElementById('bulkCount');
      const selectAllCb = document.getElementById('selectAll');
      let tracks = [];
      let checkedIds = new Set();

      function showStatus(message, isError = false) {
        status.textContent = message;
        status.style.display = 'block';
        status.style.background = isError ? '#fff3f3' : '#f1f7ff';
      }

      async function loadTracks() {
        tracks = await AdminDataStore.fetchJsonCached('/.netlify/functions/catalog?resource=tracks', 'tracks');
        renderRows();
      }

      async function updateTrack(id, payload) {
        await AdminDataStore.requestJson('/.netlify/functions/catalog', { method: 'POST', body: JSON.stringify({ action: 'updateTrack', id, updates: payload }) });
        AdminDataStore.invalidateCache(['tracks']);
      }

      async function removeTrack(track) {
        if (!window.confirm(`Delete ${track.trackName}?`)) return;
        try {
          await AdminDataStore.requestJson('/.netlify/functions/catalog', { method: 'POST', body: JSON.stringify({ action: 'deleteTrack', id: track._id }) });
          tracks = tracks.filter((t) => t._id !== track._id);
          AdminDataStore.invalidateCache(['tracks', 'albums']);
          renderRows();
          showStatus('Track deleted');
        } catch (error) {
          showStatus('Could not delete track', true);
        }
      }

      async function togglePublish(track) {
        try {
          await updateTrack(track._id, { published: track.published === false });
          track.published = track.published === false;
          renderRows();
          showStatus('Publish state updated.');
        } catch (_error) {
          showStatus('Unable to update publish status', true);
        }
      }

      function updateBulkBar() {
        const n = checkedIds.size;
        bulkBar.style.display = n > 0 ? 'flex' : 'none';
        bulkCount.textContent = `${n} track${n !== 1 ? 's' : ''} selected`;
        // Sync select-all checkbox state
        const visibleIds = Array.from(tableBody.querySelectorAll('input[type=checkbox]')).map(cb => cb.dataset.id);
        selectAllCb.checked = visibleIds.length > 0 && visibleIds.every(id => checkedIds.has(id));
        selectAllCb.indeterminate = !selectAllCb.checked && visibleIds.some(id => checkedIds.has(id));
      }

      function renderRows() {
        const filter = searchInput.value.toLowerCase();
        tableBody.innerHTML = '';
        tracks.filter((t) => `${t.trackName} ${t.albumName} ${t.artistName}`.toLowerCase().includes(filter)).forEach((track) => {
          const tr = document.createElement('tr');

          // Checkbox cell
          const cbCell = document.createElement('td');
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.dataset.id = track._id;
          cb.checked = checkedIds.has(track._id);
          cb.addEventListener('change', () => {
            if (cb.checked) checkedIds.add(track._id); else checkedIds.delete(track._id);
            updateBulkBar();
          });
          cbCell.appendChild(cb);
          tr.appendChild(cbCell);

          tr.insertAdjacentHTML('beforeend', `<td><strong>${track.trackName || ''}</strong><br><span class="meta">${track.artistName || ''}</span></td><td>${track.albumName || ''}</td><td>${track.trackNumber || ''}</td>`);

          const publish = document.createElement('td');
          const badge = document.createElement('span');
          badge.className = `badge ${track.published === false ? 'warning' : 'success'}`;
          badge.textContent = track.published === false ? 'Unpublished' : 'Published';
          publish.appendChild(badge);

          const actions = document.createElement('td');
          actions.className = 'inline-actions';
          actions.innerHTML = `<a class="button-link button-secondary" href="fiddle.html?id=${track._id}">Edit</a>`;
          const publishBtn = document.createElement('button');
          publishBtn.className = 'button-link button-secondary';
          publishBtn.textContent = track.published === false ? 'Publish' : 'Unpublish';
          publishBtn.onclick = () => togglePublish(track);
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'button-link button-danger';
          deleteBtn.textContent = 'Delete';
          deleteBtn.onclick = () => removeTrack(track);
          actions.appendChild(publishBtn);
          actions.appendChild(deleteBtn);

          tr.appendChild(publish);
          tr.appendChild(actions);
          tableBody.appendChild(tr);
        });
        updateBulkBar();
      }

      async function bulkSetPublish(published) {
        const ids = [...checkedIds];
        if (!ids.length) return;
        const label = published ? 'Publishing' : 'Unpublishing';
        showStatus(`${label} ${ids.length} track${ids.length !== 1 ? 's' : ''}…`);
        let done = 0;
        const failures = [];
        for (const id of ids) {
          const track = tracks.find(t => t._id === id);
          if (!track) continue;
          try {
            await updateTrack(id, { published });
            track.published = published;
            done++;
          } catch (_e) {
            failures.push(track.trackName || id);
          }
        }
        checkedIds.clear();
        renderRows();
        if (failures.length) {
          showStatus(`Done (${done} updated, ${failures.length} failed: ${failures.join(', ')})`, true);
        } else {
          showStatus(`${done} track${done !== 1 ? 's' : ''} ${published ? 'published' : 'unpublished'}.`);
        }
        AdminDataStore.invalidateCache(['tracks']);
      }

      document.getElementById('fillDurationsBtn').addEventListener('click', async () => {
        const btn = document.getElementById('fillDurationsBtn');
        const hint = document.getElementById('fillDurationsHint');
        const results = document.getElementById('fillDurationsResults');
        btn.disabled = true;
        btn.textContent = 'Working…';
        hint.textContent = '';
        results.style.display = 'none';
        results.innerHTML = '';
        try {
          const missing = tracks.filter(t => !t.durationSeconds || t.durationSeconds <= 0);
          if (missing.length === 0) {
            hint.textContent = 'All tracks already have durations.';
            return;
          }
          let updated = 0;
          const failures = [];
          for (let i = 0; i < missing.length; i++) {
            const track = missing[i];
            hint.textContent = `Processing ${i + 1} of ${missing.length}…`;
            if (!track.mp3Url) {
              failures.push({ trackName: track.trackName, albumName: track.albumName, reason: 'No MP3 URL set' });
              continue;
            }
            try {
              const meta = await AdminDataStore.requestJson(
                '/.netlify/functions/getTrackMetadata?url=' + encodeURIComponent(track.mp3Url)
              );
              if (!meta.durationSeconds) {
                failures.push({ trackName: track.trackName, albumName: track.albumName, mp3Url: track.mp3Url, reason: 'Could not determine duration' });
                continue;
              }
              await AdminDataStore.requestJson('/.netlify/functions/catalog', {
                method: 'POST',
                body: JSON.stringify({ action: 'updateTrack', id: track._id, updates: { durationSeconds: meta.durationSeconds } }),
              });
              track.durationSeconds = meta.durationSeconds;
              updated++;
            } catch (err) {
              failures.push({ trackName: track.trackName, albumName: track.albumName, mp3Url: track.mp3Url, reason: err.message });
            }
          }
          hint.textContent = `${updated} of ${missing.length} tracks updated.`;
          if (failures.length > 0) {
            const lines = failures.map((f) => {
              const name = [f.trackName, f.albumName].filter(Boolean).join(' — ') || 'Unknown';
              return `<li><strong>${name}</strong><br><span class="meta">${f.reason}</span>${f.mp3Url ? `<br><span class="meta" style="word-break:break-all;">${f.mp3Url}</span>` : ''}</li>`;
            });
            results.innerHTML = `<p class="meta" style="margin-bottom:6px;">${failures.length} track${failures.length !== 1 ? 's' : ''} could not be updated:</p><ul style="margin:0;padding-left:20px;line-height:1.8;">${lines.join('')}</ul>`;
            results.style.cssText = 'display:block;background:#fff3f3;border:1px solid #f5c6cb;border-radius:6px;padding:12px 16px;margin-top:12px;';
          }
          if (updated > 0) {
            AdminDataStore.invalidateCache(['tracks']);
            await loadTracks();
          }
        } catch (err) {
          hint.textContent = 'Error: ' + err.message;
        } finally {
          btn.disabled = false;
          btn.textContent = 'Fill missing durations';
        }
      });

      selectAllCb.addEventListener('change', () => {
        const visibleCbs = Array.from(tableBody.querySelectorAll('input[type=checkbox]'));
        if (selectAllCb.checked) {
          visibleCbs.forEach(cb => { checkedIds.add(cb.dataset.id); cb.checked = true; });
        } else {
          visibleCbs.forEach(cb => { checkedIds.delete(cb.dataset.id); cb.checked = false; });
        }
        updateBulkBar();
      });
      document.getElementById('bulkPublishBtn').addEventListener('click', () => bulkSetPublish(true));
      document.getElementById('bulkUnpublishBtn').addEventListener('click', () => bulkSetPublish(false));
      document.getElementById('bulkClearBtn').addEventListener('click', () => {
        checkedIds.clear();
        renderRows();
      });

      searchInput.addEventListener('input', () => { checkedIds.clear(); renderRows(); });
      window.addEventListener('DOMContentLoaded', async () => {
        AdminDataStore.mountHeader();
        AdminDataStore.mountTabs();
        try { await loadTracks(); } catch (error) { showStatus('Unable to load tracks.', true); }
      });
    </script>
  </body>
</html>
