<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="/styles/style.css" />
    <script src="/site-settings.js" defer></script>
  </head>
  <body>
    <nav class="topbar">
      <a class="nav-brand" href="/" aria-label="Home"><span class="brand-mark"></span><span class="brand-word" id="supportBrand">Site</span></a>
      <div class="nav-actions">
        <a class="nav-link" href="/player.html"><i class="icon fa-solid fa-compact-disc"></i><span>Listen</span></a>
      </div>
    </nav>
    <main>
      <section class="support-hero" style="max-width:980px;margin:40px auto;padding:0 18px;text-align:center;">
        <p class="eyebrow">Support</p>
        <h1 id="supportTitle">Support this project</h1>
        <p id="supportIntro">If you enjoy this archive and want to help sustain it, these options support future work.</p>
      </section>
      <section class="support-grid" style="max-width:1080px;margin:0 auto 48px;padding:0 18px 48px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;">
        <article class="support-card" style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center;">
          <h2 id="supportPrimaryHeading">Visit the store</h2>
          <p id="supportPrimaryBody">Pick up music, merch, or downloads through the main store.</p>
          <div class="actions"><a id="supportPrimaryLink" class="pill primary" href="#" target="_blank" rel="noopener noreferrer"><span id="supportPrimaryCta">Visit store</span></a></div>
        </article>
        <article class="support-card" style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center;">
          <h2 id="supportSecondaryHeading">Leave a tip</h2>
          <p id="supportSecondaryBody">Tips help fund hosting and future releases.</p>
          <iframe id="supportEmbed" class="embed-frame" src="" height="712" title="Support embed"></iframe>
        </article>
      </section>
    </main>
    <script>
      window.addEventListener('DOMContentLoaded', async () => {
        const settings = await window.SiteSettings.loadSiteSettings();
        window.SiteSettings.applyFontPair(settings.fontPair);
        document.title = settings.supportPageTitle || 'Support';
        document.getElementById('supportBrand').textContent = settings.brandName || settings.siteTitle || 'Site';
        document.getElementById('supportTitle').textContent = settings.supportPageTitle || 'Support this project';
        document.getElementById('supportIntro').textContent = settings.supportIntro || '';
        document.getElementById('supportPrimaryHeading').textContent = settings.supportPrimaryHeading || 'Visit the store';
        document.getElementById('supportPrimaryBody').textContent = settings.supportPrimaryBody || '';
        document.getElementById('supportPrimaryCta').textContent = settings.supportPrimaryCta || 'Visit store';
        document.getElementById('supportPrimaryLink').href = settings.supportPrimaryUrl || '#';
        document.getElementById('supportSecondaryHeading').textContent = settings.supportSecondaryHeading || 'Leave a tip';
        document.getElementById('supportSecondaryBody').textContent = settings.supportSecondaryBody || '';
        const embed = document.getElementById('supportEmbed');
        embed.title = settings.supportEmbedTitle || 'Support embed';
        if (settings.supportEmbedUrl) embed.src = settings.supportEmbedUrl; else embed.style.display = 'none';
      });
    </script>
  </body>
</html>
