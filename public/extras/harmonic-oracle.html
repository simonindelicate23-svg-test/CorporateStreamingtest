<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Harmonic Oracle</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #04040c;
    --surface: #0a0815;
    --card: #0f0c1e;
    --border: #1a1635;
    --glow: #7c3aed;
    --glow2: #c026d3;
    --gold: #fbbf24;
    --gold2: #f59e0b;
    --text: #ede9fe;
    --muted: #6b5f8a;
    --dim: #130f24;
  }

  html, body { height: 100%; overflow-x: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, serif;
    min-height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  /* ── PARTICLE CANVAS ──────────────────────────── */
  #particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── SCREEN WRAPPER ───────────────────────────── */
  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  /* ── SETUP ────────────────────────────────────── */
  #setup {
    animation: arise 0.8s ease;
  }

  .oracle-sigil {
    font-size: 3.5rem;
    margin-bottom: 20px;
    display: block;
    filter: drop-shadow(0 0 20px rgba(124,58,237,0.8));
    animation: sigil-float 4s ease-in-out infinite;
  }

  @keyframes sigil-float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%       { transform: translateY(-8px) rotate(3deg); }
  }

  h1.oracle-title {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--gold), var(--glow2), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }

  .oracle-sub {
    color: var(--muted);
    font-size: 0.95rem;
    font-style: italic;
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .step-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    text-align: left;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Fira Code', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }

  textarea:focus {
    border-color: rgba(124,58,237,0.5);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.08), 0 0 20px rgba(124,58,237,0.1);
  }

  textarea::placeholder { color: var(--muted); opacity: 0.5; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 20px;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  input.query-input {
    width: 100%;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
    text-align: center;
    font-style: italic;
  }

  input.query-input::placeholder { color: var(--muted); opacity: 0.5; }
  input.query-input:focus {
    border-color: rgba(192,38,211,0.6);
    box-shadow: 0 0 0 3px rgba(192,38,211,0.08), 0 0 30px rgba(192,38,211,0.1);
  }

  .invoke-btn {
    width: 100%;
    padding: 18px;
    background: none;
    border: 1.5px solid rgba(251,191,36,0.4);
    border-radius: 14px;
    color: var(--gold);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }

  .invoke-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(251,191,36,0.08), rgba(124,58,237,0.08));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .invoke-btn:hover {
    border-color: rgba(251,191,36,0.8);
    box-shadow: 0 0 30px rgba(251,191,36,0.15), 0 0 60px rgba(124,58,237,0.1);
    letter-spacing: 3px;
  }

  .invoke-btn:hover::before { opacity: 1; }

  .setup-err {
    margin-top: 14px;
    padding: 12px 16px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px;
    color: #fca5a5;
    font-size: 0.85rem;
    display: none;
  }

  /* ── RITUAL LOADING ───────────────────────────── */
  #ritual {
    display: none;
    text-align: center;
    animation: arise 0.4s ease;
  }

  .ritual-glyph {
    font-size: 4rem;
    display: block;
    margin-bottom: 28px;
    animation: ritual-spin 2s linear infinite;
    filter: drop-shadow(0 0 20px rgba(192,38,211,0.9));
  }

  @keyframes ritual-spin {
    0%   { transform: rotate(0deg) scale(1); }
    25%  { transform: rotate(90deg) scale(1.1); }
    50%  { transform: rotate(180deg) scale(1); }
    75%  { transform: rotate(270deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .ritual-words {
    font-size: 1rem;
    color: var(--muted);
    font-style: italic;
    animation: word-pulse 1.5s ease-in-out infinite;
  }

  @keyframes word-pulse {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 1; }
  }

  /* ── READING SCREEN ───────────────────────────── */
  #reading {
    display: none;
    padding: 40px 20px 60px;
  }

  .reading-header { text-align: center; margin-bottom: 48px; }

  .reading-query {
    font-size: 1.1rem;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .reading-title {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    background: linear-gradient(110deg, var(--gold), var(--glow2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .oracle-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    color: rgba(251,191,36,0.3);
    font-size: 1.2rem;
    justify-content: center;
  }

  .oracle-rule::before, .oracle-rule::after {
    content: '✦ ✦ ✦';
    font-size: 0.7rem;
    letter-spacing: 4px;
  }

  /* ── CARD GRID ────────────────────────────────── */
  .cards-wrap {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }

  @media (max-width: 640px) {
    .cards-wrap { grid-template-columns: 1fr; max-width: 300px; margin: 0 auto 40px; }
  }

  /* ── TAROT CARD ───────────────────────────────── */
  .tarot-card {
    cursor: pointer;
    perspective: 1000px;
    aspect-ratio: 0.6;
    animation: card-appear var(--delay, 0.4s) ease both;
  }

  @keyframes card-appear {
    from { opacity: 0; transform: translateY(40px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .tarot-card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    overflow: hidden;
  }

  /* Card back */
  .card-back {
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: box-shadow 0.3s;
  }

  .card-back:hover {
    box-shadow: 0 0 30px rgba(124,58,237,0.3), 0 0 60px rgba(124,58,237,0.1);
    border-color: rgba(124,58,237,0.4);
  }

  .card-back-pattern {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(124,58,237,0.04) 8px, rgba(124,58,237,0.04) 9px),
      repeating-linear-gradient(-45deg, transparent, transparent 8px, rgba(192,38,211,0.03) 8px, rgba(192,38,211,0.03) 9px);
  }

  .card-back-glyph { font-size: 2.5rem; position: relative; z-index: 1; filter: drop-shadow(0 0 12px rgba(124,58,237,0.8)); }
  .card-back-pos { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); position: relative; z-index: 1; }
  .card-back-hint { font-size: 0.7rem; color: var(--muted); position: relative; z-index: 1; font-style: italic; }

  .card-back-border {
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(251,191,36,0.1);
    border-radius: 11px;
    pointer-events: none;
  }

  /* Card front — full-bleed artwork with gradient overlay */
  .card-front {
    background: linear-gradient(135deg, #12082a, #0a1228);
    border: 1px solid var(--border);
    transform: rotateY(180deg);
  }

  /* Full-bleed background art */
  .card-art-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .card-art-bg img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.55;
  }

  /* Large genre glyph, always present, dimmed if artwork exists */
  .card-art-glyph {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    opacity: 0.18;
  }

  /* Gradient that ensures text is readable at bottom */
  .card-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(4,4,12,0.98) 0%,
      rgba(4,4,12,0.85) 38%,
      rgba(4,4,12,0.3)  65%,
      transparent        100%
    );
  }

  /* Subtle vignette at top */
  .card-gradient::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(4,4,12,0.5) 0%, transparent 30%);
  }

  /* Position name — top centre */
  .card-position-tag {
    position: absolute;
    top: 12px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(251,191,36,0.75);
  }

  /* All text content anchored to the bottom */
  .card-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 14px 14px 16px;
  }

  .card-track-title {
    font-size: 0.9rem;
    font-weight: 800;
    line-height: 1.25;
    margin-bottom: 3px;
    letter-spacing: -0.2px;
    color: #fff;
  }

  .card-artist {
    font-size: 0.7rem;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .card-interpretation {
    font-size: 0.68rem;
    color: rgba(220,210,255,0.72);
    line-height: 1.5;
    font-style: italic;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-play-hint {
    font-size: 0.58rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(124,58,237,0.65);
  }

  /* Playing state */
  .tarot-card.playing .card-front {
    border-color: rgba(124,58,237,0.5);
    box-shadow: 0 0 30px rgba(124,58,237,0.3);
  }

  .card-playing-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--glow), var(--glow2));
    width: 0;
    transition: none;
  }

  .tarot-card.playing .card-playing-bar {
    animation: progress-bar 4s linear infinite;
  }

  @keyframes progress-bar {
    0%   { width: 0; }
    100% { width: 100%; }
  }

  /* ── AUDIO + SEEK ─────────────────────────────── */
  .audio-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    max-width: 500px;
    margin: 0 auto 32px;
    text-align: center;
    animation: arise 0.6s 0.8s ease both;
    opacity: 0;
  }

  .audio-panel-label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .audio-now-title { font-size: 1rem; font-weight: 800; margin-bottom: 2px; }
  .audio-now-artist { font-size: 0.82rem; color: var(--gold); margin-bottom: 16px; }

  audio {
    width: 100%;
    border-radius: 8px;
    accent-color: var(--glow);
    margin-bottom: 4px;
  }

  /* ── AGAIN BUTTON ─────────────────────────────── */
  .again-wrap { text-align: center; margin-top: 24px; }

  .again-btn {
    padding: 14px 36px;
    background: none;
    border: 1.5px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }

  .again-btn:hover {
    border-color: rgba(251,191,36,0.7);
    box-shadow: 0 0 20px rgba(251,191,36,0.1);
  }

  /* ── SCORE EXPLANATION ────────────────────────── */

  /* ── GLOBAL ANIMATIONS ────────────────────────── */
  @keyframes arise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- ── SETUP ─────────────────────────────────────── -->
<div class="screen" id="setup">
  <div style="max-width:520px;width:100%;text-align:center;animation:arise 0.8s ease">
    <span class="oracle-sigil">🔮</span>
    <h1 class="oracle-title">The Harmonic Oracle</h1>
    <p class="oracle-sub">
      Give the Oracle a catalogue URL.<br>
      Ask it anything. It will answer in music.
    </p>

    <div class="step-label">I. The Catalogue URL</div>
    <input type="url" id="catInp" placeholder="https://yoursite.com/catalogue"
      style="width:100%;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:0.95rem;outline:none;margin-bottom:20px;transition:border-color 0.2s,box-shadow 0.2s;display:block"
      onkeydown="if(event.key==='Enter')document.getElementById('queryInp').focus()">

    <div class="divider">then</div>

    <div class="step-label">II. Your Question or Mood</div>
    <input class="query-input" id="queryInp" type="text"
      placeholder="e.g. I need strength to face what's coming…"
      onkeydown="if(event.key==='Enter')invoke()" />

    <div id="serr" class="setup-err"></div>

    <button class="invoke-btn" id="invokeBtn" onclick="invoke()">
      ✦ &nbsp; Consult the Oracle &nbsp; ✦
    </button>
  </div>
</div>

<!-- ── RITUAL LOADING ─────────────────────────────── -->
<div class="screen" id="ritual" style="display:none">
  <span class="ritual-glyph">⬡</span>
  <div class="ritual-words" id="ritualWords">The Oracle is listening…</div>
</div>

<!-- ── READING ────────────────────────────────────── -->
<div class="screen" id="reading" style="display:none;justify-content:flex-start;padding-top:40px">
  <div style="width:100%;max-width:900px">
    <div class="reading-header">
      <div class="reading-query" id="readingQuery">You asked about…</div>
      <div class="reading-title">Your Reading Has Been Cast</div>
      <div class="oracle-rule">✦</div>
    </div>

    <div class="cards-wrap" id="cardsWrap"></div>

    <div class="audio-panel" id="audioPanel" style="display:none">
      <div class="audio-panel-label">⬡ &nbsp; Now Channelling &nbsp; ⬡</div>
      <div class="audio-now-title" id="audioTitle">—</div>
      <div class="audio-now-artist" id="audioArtist">—</div>
      <audio id="oracleAudio" controls></audio>
    </div>

    <div class="again-wrap">
      <button class="again-btn" onclick="resetToSetup()">✦ &nbsp; Ask Again &nbsp; ✦</button>
    </div>
  </div>
</div>

<script>
/* ── PARTICLES ──────────────────────────────────── */
(function() {
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function init() {
    resize();
    stars = Array.from({ length: 120 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.003,
      dx: (Math.random() - 0.5) * 0.1,
      dy: (Math.random() - 0.5) * 0.05,
      hue: Math.random() > 0.7 ? 270 : Math.random() > 0.5 ? 300 : 220,
    }));
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.a  += s.da;
      if (s.a > 1 || s.a < 0) s.da *= -1;
      s.x  = (s.x + s.dx + W) % W;
      s.y  = (s.y + s.dy + H) % H;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${s.hue},80%,80%,${s.a * 0.6})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', () => { resize(); });
  init();
  frame();
})();

/* ── STATE ──────────────────────────────────────── */
let pool = [];         // all playable tracks
let currentAudio = null;
let playingCardIdx = -1;

/* ── INTERPRETATIONS ────────────────────────────── */
const POSITIONS = [
  { name: 'THE RESONANCE', glyph: '◈', desc: 'What mirrors your current energy' },
  { name: 'THE MIRROR',    glyph: '◇', desc: 'What reflects your hidden truth' },
  { name: 'THE PATH',      glyph: '◉', desc: 'Where this energy leads you' },
];

const TEMPLATES = {
  default: [
    "The currents align. This sound carries the frequency you are seeking, though you may not yet know why.",
    "Something in the arrangement of these notes speaks to the question you hold. Listen beneath the surface.",
    "The Oracle does not explain; it reveals. Sit with this track and let its geometry work on you.",
    "This is not a coincidence. The mathematics of resonance have chosen this piece for you.",
    "The spaces between the notes are where your answer lives. Pay attention to the silence.",
  ],
  rock: [
    "Raw force answers raw need. Let this electric current shatter the obstacle that stands before you.",
    "The resistance you feel is the same tension as the string before it rings. Hold on. Then release.",
    "Sometimes the universe shouts. This is your signal to stop whispering.",
  ],
  jazz: [
    "Your answer is not fixed — it improvises, shifts, finds the note that was never written in the score.",
    "The grace of this music is that it does not resolve where you expect. Neither will your situation.",
    "Syncopation: the art of landing exactly where you weren't. This is your map.",
  ],
  classical: [
    "Structure holds the chaos. What appears complicated resolves, in time, into something inevitable.",
    "You are in the middle of the movement. The resolution is written; you have not reached it yet.",
    "The composer saw the whole piece before writing a single note. Trust that someone sees your arc too.",
  ],
  electronic: [
    "The signal was always there. You only needed to tune the frequency.",
    "Every loop returns to its origin transformed. What you are circling will reveal its pattern.",
    "The grid behind reality is not cold — it hums with intention. This sound is evidence.",
  ],
  ambient: [
    "The answer is already present, filling the space you created by asking the question.",
    "Do not reach for it. It is already here, the way weather is already here, surrounding everything.",
    "This is the frequency of acceptance. Not surrender — arrival.",
  ],
  folk: [
    "Old words, old paths. The land remembers what the mind forgets. Walk slowly.",
    "Someone has been where you are standing. They left this song like a stone marker on a trail.",
    "Your roots are stronger than you know. What grew before will grow again.",
  ],
  pop: [
    "Joy is not a distraction from meaning — it IS the meaning. The Oracle sees you hiding from delight.",
    "The simple truth is still the truth. Do not dismiss what is offered because it arrived beautifully.",
    "The signal is clear. Sometimes the message is that things are actually fine.",
  ],
  metal: [
    "The darkness here is not an absence — it is a presence with structure and intention. Go through it.",
    "This is the sound of transformation by fire. You will not be the same on the other side. Good.",
    "Intensity is not the enemy of clarity. Sometimes you need to turn it up to hear at all.",
  ],
};

function getInterpretation(genre, positionIdx) {
  const g   = (genre || '').toLowerCase();
  let pool  = TEMPLATES.default;

  if (g.includes('rock'))     pool = [...TEMPLATES.rock,       ...TEMPLATES.default];
  if (g.includes('jazz'))     pool = [...TEMPLATES.jazz,       ...TEMPLATES.default];
  if (g.includes('classic'))  pool = [...TEMPLATES.classical,  ...TEMPLATES.default];
  if (g.includes('electro') || g.includes('techno') || g.includes('house') || g.includes('synth'))
                              pool = [...TEMPLATES.electronic,  ...TEMPLATES.default];
  if (g.includes('ambient') || g.includes('drone') || g.includes('chill'))
                              pool = [...TEMPLATES.ambient,     ...TEMPLATES.default];
  if (g.includes('folk') || g.includes('country') || g.includes('acoustic'))
                              pool = [...TEMPLATES.folk,        ...TEMPLATES.default];
  if (g.includes('pop'))      pool = [...TEMPLATES.pop,        ...TEMPLATES.default];
  if (g.includes('metal') || g.includes('doom') || g.includes('black'))
                              pool = [...TEMPLATES.metal,       ...TEMPLATES.default];

  // Use position index to create variety per card
  const idx = (positionIdx * 7 + Math.floor(Math.random() * pool.length)) % pool.length;
  return pool[idx];
}

/* ── SCORING ────────────────────────────────────── */
const STOP_WORDS = new Set([
  // question / auxiliary words that prefix almost every query
  'will','would','could','should','shall','might','must','can','may',
  'did','does','do','done','has','have','had','was','were','are','is','be','been','being',
  'what','when','where','which','who','whom','whose','why','how',
  // articles, conjunctions, prepositions
  'the','a','an','and','but','or','nor','for','yet','so',
  'in','on','at','to','of','up','as','by','if','it','its',
  'from','with','into','onto','over','about','after','before',
  'that','this','these','those','than','then','there','their','they',
  // pronouns / fillers
  'i','me','my','we','us','our','you','your','he','she','his','her',
  'not','no','any','all','some','more','very','just','also',
  'get','got','go','going','come','coming','make','making',
]);

function scoreTrack(track, query) {
  if (!query) return Math.random();
  const q       = query.toLowerCase().replace(/[^a-z0-9\s]/g, '');
  const words   = q.split(/\s+/).filter(w => w.length > 2 && !STOP_WORDS.has(w));
  const text    = [track.title, track.artist, track.album, track.genre]
    .filter(Boolean).join(' ').toLowerCase();

  let score = Math.random() * 0.3; // always some chaos

  for (const w of words) {
    if (text.includes(w)) score += 2;
  }

  // Emotional keyword resonance
  const emotional = {
    strength: ['power','rock','metal','strong','force','fight','war','battle','might'],
    sad:      ['blue','rain','grey','dark','lost','alone','night','shadow','fall','winter'],
    love:     ['love','heart','kiss','soul','tender','gentle','warm','soft','dance'],
    hope:     ['light','sun','rise','dawn','spring','open','free','new','bright','day'],
    anger:    ['rage','fire','burn','storm','war','break','crash','loud','hard','heavy'],
    calm:     ['still','quiet','peace','slow','breathe','rest','sleep','dream','float','drift'],
    journey:  ['road','path','walk','travel','move','step','way','river','wind','fly','go'],
  };

  for (const [emotion, kws] of Object.entries(emotional)) {
    if (words.some(w => emotion.includes(w) || kws.some(k => q.includes(k)))) {
      if (kws.some(k => text.includes(k))) score += 1.5;
    }
  }

  return score;
}

/* ── GENRE EMOJI ────────────────────────────────── */
function genreGlyph(genre) {
  if (!genre) return '🎵';
  const g = genre.toLowerCase();
  if (g.includes('rock'))     return '🎸';
  if (g.includes('jazz'))     return '🎷';
  if (g.includes('classic'))  return '🎻';
  if (g.includes('electro') || g.includes('techno')) return '🌐';
  if (g.includes('hip') || g.includes('rap'))  return '🎤';
  if (g.includes('pop'))      return '✨';
  if (g.includes('folk'))     return '🌿';
  if (g.includes('metal'))    return '🔥';
  if (g.includes('ambient'))  return '🌊';
  if (g.includes('soul'))     return '💜';
  return '◈';
}

/* ── INVOKE ─────────────────────────────────────── */
async function invoke() {
  const url   = document.getElementById('catInp').value.trim();
  const query = document.getElementById('queryInp').value.trim();
  const serr  = document.getElementById('serr');
  const btn   = document.getElementById('invokeBtn');
  serr.style.display = 'none';

  if (!url.match(/^https?:\/\//)) {
    serr.textContent = 'Please enter a valid https:// catalogue URL.';
    serr.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⬡  Summoning…';

  let data;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
    if (!data.releases) throw new Error('No releases in response.');
  } catch (e) {
    serr.textContent = 'Could not reach the catalogue: ' + e.message;
    serr.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '✦  Consult the Oracle  ✦';
    return;
  }

  // Build pool
  pool = [];
  for (const rel of data.releases) {
    for (const t of rel.tracks || []) {
      if (t.audioUrl && !t.gated) {
        pool.push({
          title:    t.title || rel.title,
          artist:   rel.artist,
          album:    rel.title,
          genre:    t.genre || rel.genre,
          year:     t.year  || rel.year,
          duration: t.durationSeconds,
          audioUrl: t.audioUrl,
          art:      t.artworkUrl || rel.artworkUrl,
        });
      }
    }
  }

  if (!pool.length) {
    serr.textContent = 'No playable tracks found in this catalogue.';
    serr.style.display = 'block';
    return;
  }

  // Show ritual
  showScreen('ritual');

  const phrases = [
    'The Oracle is listening…',
    'Aligning the harmonics…',
    'Reading the resonant field…',
    'The cards are being drawn…',
    'Your answer stirs in the deep…',
  ];
  let pi = 0;
  const phraseTimer = setInterval(() => {
    document.getElementById('ritualWords').textContent = phrases[++pi % phrases.length];
  }, 600);

  setTimeout(() => {
    clearInterval(phraseTimer);
    showReading(query);
  }, 2800);
}

/* ── BUILD READING ──────────────────────────────── */
function showReading(query) {
  showScreen('reading');

  document.getElementById('readingQuery').textContent =
    query ? `"${query}"` : 'a question unspoken';

  // Score + pick 3 unique tracks
  const scored = pool
    .map((t, i) => ({ t, s: scoreTrack(t, query), i }))
    .sort((a, b) => b.s - a.s);

  const chosen = [];
  const seen   = new Set();
  for (const item of scored) {
    const key = item.t.title + item.t.artist;
    if (!seen.has(key)) { chosen.push(item.t); seen.add(key); }
    if (chosen.length === 3) break;
  }

  // Pad if needed (tiny catalogue)
  while (chosen.length < 3) {
    const r = pool[Math.floor(Math.random() * pool.length)];
    if (!chosen.includes(r)) chosen.push(r);
  }

  // Render cards
  const wrap = document.getElementById('cardsWrap');
  wrap.innerHTML = '';

  chosen.forEach((track, i) => {
    const pos  = POSITIONS[i];
    const terp = getInterpretation(track.genre, i);
    const delay = (0.2 + i * 0.15).toFixed(2) + 's';

    const card = document.createElement('div');
    card.className = 'tarot-card';
    card.style.setProperty('--delay', delay);
    card.dataset.idx = i;

    card.innerHTML = `
      <div class="card-inner">
        <!-- BACK -->
        <div class="card-face card-back">
          <div class="card-back-pattern"></div>
          <div class="card-back-border"></div>
          <div class="card-back-glyph">${pos.glyph}</div>
          <div class="card-back-pos">${pos.name}</div>
          <div class="card-back-hint">${pos.desc}</div>
        </div>
        <!-- FRONT -->
        <div class="card-face card-front">
          <!-- Full-bleed artwork -->
          <div class="card-art-bg">
            ${track.art ? `<img src="${escHtml(track.art)}" alt="" onerror="this.style.display='none'">` : ''}
            <div class="card-art-glyph">${genreGlyph(track.genre)}</div>
          </div>
          <!-- Gradient overlay -->
          <div class="card-gradient"></div>
          <!-- Position name at top -->
          <div class="card-position-tag">${pos.name}</div>
          <!-- Playing progress bar -->
          <div class="card-playing-bar"></div>
          <!-- Text anchored to bottom -->
          <div class="card-content">
            <div class="card-track-title">${escHtml(track.title || 'Untitled')}</div>
            <div class="card-artist">${escHtml(track.artist || 'Unknown')}${track.year ? ` · ${track.year}` : ''}</div>
            <div class="card-interpretation">${terp}</div>
            <div class="card-play-hint">▶ &nbsp;tap to channel</div>
          </div>
        </div>
      </div>
    `;

    card.addEventListener('click', () => onCardClick(card, track, i));
    wrap.appendChild(card);
  });

  // Flip cards sequentially
  chosen.forEach((_, i) => {
    setTimeout(() => {
      const c = wrap.children[i];
      if (c) c.classList.add('flipped');
    }, 400 + i * 300);
  });

  document.getElementById('audioPanel').style.display = 'none';
  playingCardIdx = -1;
}

/* ── CARD CLICK ─────────────────────────────────── */
function onCardClick(card, track, idx) {
  if (!card.classList.contains('flipped')) {
    card.classList.add('flipped');
    return;
  }

  // Stop previous
  const audio = document.getElementById('oracleAudio');
  if (currentAudio) {
    currentAudio.pause();
    document.querySelectorAll('.tarot-card').forEach(c => c.classList.remove('playing'));
  }

  if (playingCardIdx === idx) {
    // Toggle: stop if same card
    playingCardIdx = -1;
    currentAudio = null;
    document.getElementById('audioPanel').style.display = 'none';
    return;
  }

  // Play
  playingCardIdx = idx;
  card.classList.add('playing');
  audio.src = track.audioUrl;
  audio.play().catch(() => {});
  currentAudio = audio;

  document.getElementById('audioTitle').textContent  = track.title || 'Untitled';
  document.getElementById('audioArtist').textContent = track.artist || 'Unknown';

  const panel = document.getElementById('audioPanel');
  panel.style.display = 'block';
  panel.style.opacity = '1';
  panel.style.transform = 'translateY(0)';

  audio.onended = () => {
    card.classList.remove('playing');
    playingCardIdx = -1;
  };
}

/* ── RESET ──────────────────────────────────────── */
function resetToSetup() {
  const audio = document.getElementById('oracleAudio');
  audio.pause();
  currentAudio  = null;
  playingCardIdx = -1;
  const btn = document.getElementById('invokeBtn');
  btn.disabled = false;
  btn.textContent = '✦  Consult the Oracle  ✦';
  showScreen('setup');
}

/* ── SCREEN HELPER ──────────────────────────────── */
function showScreen(id) {
  ['setup','ritual','reading'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = s === id ? 'flex' : 'none';
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

(function () {
  const inp = document.getElementById('catInp');
  if (inp && location.protocol !== 'file:') {
    inp.value = location.origin + '/catalogue';
  }
})();
</script>
