<!DOCTYPE html>
<html>
  <head>
    <title>Edit Releases</title>
    <link rel="stylesheet" href="/styles/admin.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="/admin/common.js" defer></script>
  </head>
  <body>
    <div class="admin-shell">
      <div data-admin-tabs></div>
      <div class="card">
        <h1>Edit releases</h1>
        <p class="meta">Album-level edits propagate to every track. Track metadata is inferred automatically from MP3 URLs when adding new tracks.</p>
        <div class="form-grid">
          <div><label for="albumSelect">Choose release</label><select id="albumSelect"></select></div>
          <div><label>Track count</label><div id="trackCount" class="meta">—</div></div>
        </div>
        <div id="status" class="status" style="display:none;"></div>
      </div>

      <div class="card" id="formCard" style="display:none;">
        <form id="albumForm">
          <div class="form-grid">
            <div><label for="albumName">Album name</label><input type="text" id="albumName" required /></div>
            <div><label for="albumId">Album ID</label><input type="text" id="albumId" /></div>
            <div><label for="artistName">Artist name</label><input type="text" id="artistName" /></div>
            <div><label for="artworkUrl">Artwork URL</label><input type="url" id="artworkUrl" /></div>
            <div><label for="albumArtworkUrl">Album artwork URL</label><input type="url" id="albumArtworkUrl" /></div>
            <div><label for="bgcolor">Background colour</label><input type="text" id="bgcolor" /></div>
            <div><label for="genre">Genre</label><input type="text" id="genre" /></div>
            <div><label for="year">Year</label><input type="number" id="year" /></div>
            <div style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="published" /><label for="published" style="margin:0;">Published?</label></div>
          </div>
          <div class="actions" style="margin-top:16px;"><button type="submit">Apply album updates</button></div>
        </form>
      </div>

      <div class="card" id="addTracksCard" style="display:none;">
        <h2>Add tracks to release</h2>
        <form id="addTracksForm">
          <div id="tracksContainer" class="tracks-preview"></div>
          <button type="button" id="addTrackButton">+ Add track</button>
          <div class="actions" style="margin-top:16px;"><button type="submit">Save tracks</button></div>
        </form>
        <div id="trackStatus" class="status" style="display:none;"></div>
      </div>
    </div>

    <script>
      const albumSelect = document.getElementById('albumSelect');
      const status = document.getElementById('status');
      const formCard = document.getElementById('formCard');
      const trackCount = document.getElementById('trackCount');
      const addTracksCard = document.getElementById('addTracksCard');
      const tracksContainer = document.getElementById('tracksContainer');
      const addTrackButton = document.getElementById('addTrackButton');
      const addTracksForm = document.getElementById('addTracksForm');
      const trackStatus = document.getElementById('trackStatus');

      const fields = ['albumName','albumId','artistName','artworkUrl','albumArtworkUrl','bgcolor','genre','year','published'].reduce((acc, id) => ({ ...acc, [id]: document.getElementById(id) }), {});
      let albums = [];
      let activeAlbum = null;
      let nextTrackNumber = 1;

      function showStatus(message, isError = false) { status.textContent = message; status.style.display = 'block'; status.style.background = isError ? '#fff3f3' : '#f1f7ff'; }
      function showTrackStatus(message, isError = false) { trackStatus.textContent = message; trackStatus.style.display = 'block'; trackStatus.style.background = isError ? '#fff3f3' : '#f1f7ff'; }

      function renderAlbumOptions() {
        albumSelect.innerHTML = '<option value="">Select release</option>';
        albums.forEach((album) => {
          const option = document.createElement('option');
          option.value = album.albumName || '';
          option.textContent = album.albumName || 'Untitled release';
          albumSelect.appendChild(option);
        });
      }

      function populateForm(album) {
        activeAlbum = album;
        if (!album) { formCard.style.display = 'none'; addTracksCard.style.display = 'none'; trackCount.textContent = '—'; return; }
        formCard.style.display = 'block'; addTracksCard.style.display = 'block';
        fields.albumName.value = album.albumName || ''; fields.albumId.value = album.albumId || ''; fields.artistName.value = album.artistName || '';
        fields.artworkUrl.value = album.artworkUrl || ''; fields.albumArtworkUrl.value = album.albumArtworkUrl || ''; fields.bgcolor.value = album.bgcolor || '';
        fields.genre.value = album.genre || ''; fields.year.value = album.year || ''; fields.published.checked = album.published !== false;
        trackCount.textContent = album.trackCount || 0;
        resetTrackForm();
      }

      async function loadAlbums(selectedName) {
        albums = await AdminDataStore.fetchJsonCached('/.netlify/functions/editAlbum', 'albums');
        renderAlbumOptions();
        if (selectedName) albumSelect.value = selectedName;
        populateForm(albums.find((a) => a.albumName === albumSelect.value));
      }

      function createTrackRow() {
        const wrapper = document.createElement('div');
        wrapper.className = 'track-row card';
        wrapper.innerHTML = `<label>Track name<input type="text" class="trackName" required /></label><label>MP3 URL<input type="url" class="mp3Url" required /></label><label>Order<input type="number" class="trackNumber" value="${nextTrackNumber}" min="1" required /></label><label>Duration (s)<input type="number" class="durationSeconds" /></label><label>Year<input type="number" class="trackYear" /></label><label>Genre<input type="text" class="trackGenre" /></label><label>Track medium<input type="text" class="trackMedium" /></label><label>Track notes<textarea class="trackText"></textarea></label><small class="meta metadataHint">Metadata will auto-load from MP3 URL.</small>`;
        wrapper.querySelector('.mp3Url').addEventListener('change', async () => {
          const urlInput = wrapper.querySelector('.mp3Url');
          const hint = wrapper.querySelector('.metadataHint');
          const nameInput = wrapper.querySelector('.trackName');
          const durationInput = wrapper.querySelector('.durationSeconds');
          if (!nameInput.value.trim()) nameInput.value = AdminDataStore.inferTrackNameFromUrl(urlInput.value);
          hint.textContent = 'Reading metadata…';
          const seconds = await AdminDataStore.deriveDurationFromUrl(urlInput.value);
          if (seconds && !durationInput.value) durationInput.value = seconds;
          hint.textContent = seconds ? `Metadata ready (${seconds}s)` : 'Metadata lookup skipped.';
        });
        nextTrackNumber += 1;
        return wrapper;
      }

      function resetTrackForm() { tracksContainer.innerHTML = ''; nextTrackNumber = Number(activeAlbum?.trackCount || 0) + 1; tracksContainer.appendChild(createTrackRow()); trackStatus.style.display = 'none'; }

      albumSelect.addEventListener('change', () => populateForm(albums.find((album) => album.albumName === albumSelect.value)));
      addTrackButton.addEventListener('click', () => tracksContainer.appendChild(createTrackRow()));

      document.getElementById('albumForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!activeAlbum) return;
        const updates = {};
        ['albumName','albumId','artistName','artworkUrl','albumArtworkUrl','bgcolor','genre','year'].forEach((key) => {
          if (String(activeAlbum[key] || '') !== String(fields[key].value || '')) updates[key] = fields[key].value;
        });
        if ((activeAlbum.published !== false) !== fields.published.checked) updates.published = fields.published.checked;
        if (!Object.keys(updates).length) return showStatus('No changes to save.');

        try {
          await fetch('/.netlify/functions/editAlbum', { method: 'POST', body: JSON.stringify({ albumName: activeAlbum.albumName, updates }) });
          AdminDataStore.invalidateCache(['albums', 'tracks']);
          showStatus('Album updated.');
          await loadAlbums(fields.albumName.value);
        } catch (_error) { showStatus('Could not update album.', true); }
      });

      addTracksForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!activeAlbum) return showTrackStatus('Select an album first.', true);

        const tracks = [...tracksContainer.querySelectorAll('.track-row')].map((row) => ({
          trackName: row.querySelector('.trackName').value.trim(), mp3Url: row.querySelector('.mp3Url').value.trim(),
          trackNumber: row.querySelector('.trackNumber').value, durationSeconds: row.querySelector('.durationSeconds').value,
          year: row.querySelector('.trackYear').value, genre: row.querySelector('.trackGenre').value,
          trackMedium: row.querySelector('.trackMedium').value, trackText: row.querySelector('.trackText').value
        })).filter((track) => track.trackName && track.mp3Url);

        if (!tracks.length) return showTrackStatus('Add at least one track.', true);

        const albumPayload = { albumName: fields.albumName.value || activeAlbum.albumName, albumId: fields.albumId.value, artistName: fields.artistName.value, artworkUrl: fields.artworkUrl.value, albumArtworkUrl: fields.albumArtworkUrl.value, bgcolor: fields.bgcolor.value, genre: fields.genre.value, year: fields.year.value, published: fields.published.checked };
        try {
          await fetch('/.netlify/functions/addTrack', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ album: albumPayload, tracks }) });
          AdminDataStore.invalidateCache(['albums', 'tracks']);
          showTrackStatus('Tracks added.');
          await loadAlbums(albumPayload.albumName);
        } catch (_error) { showTrackStatus('Could not save tracks.', true); }
      });

      window.addEventListener('DOMContentLoaded', async () => {
        AdminDataStore.mountTabs();
        try { await loadAlbums(); } catch (_error) { showStatus('Could not load releases.', true); }
      });
    </script>
  </body>
</html>
